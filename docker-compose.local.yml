# Fully-local / air-gapped overlay — no cloud keys required.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
#
# Defaults here work with the stock image (no extra downloads):
#   * extraction  : Tika (OSS)
#   * embeddings  : "hash" (deterministic, zero-download; lexical semantics)
#   * LLM         : Ollama (OpenAI-compatible) if you run it; otherwise structuring
#                   gracefully falls back to raw text.
#
# This overlay bakes the fastembed extra INTO the image (TOME_EXTRAS=fastembed
# build arg), so switching to real semantic embeddings needs no manual rebuild —
# just set EMBED_PROVIDER=fastembed (note: fastembed downloads a small ONNX model
# on first use). For a local LLM, pull a model into Ollama (`ollama pull qwen2.5:7b`).

x-local-build: &local-build
  build:
    context: .
    args:
      TOME_EXTRAS: "fastembed"      # offline embeddings available out of the box

x-local-env: &local-env
  EMBED_ENABLED: "true"
  EMBED_PROVIDER: "hash"            # -> "fastembed" for real semantics (now no rebuild needed)
  EXTRACT_PRIMARY: "tika"
  EXTRACT_FALLBACK: ""
  LLM_PROVIDER: "openai"            # OpenAI-compatible client pointed at local Ollama
  OPENAI_BASE_URL: "http://ollama:11434/v1"
  OPENAI_API_KEY: "ollama"
  LLM_STRUCTURE_MODEL: "qwen2.5:7b"
  LLM_NAMING_MODEL: "qwen2.5:7b"
  LLM_VISION_MODEL: "qwen2.5:7b"
  LLM_ATLAS_MODEL: "qwen2.5:7b"

services:
  ollama:
    image: ollama/ollama:latest
    volumes: [ "ollama:/root/.ollama" ]
    expose: [ "11434" ]

  gateway:
    <<: *local-build
    environment: *local-env
  worker:
    <<: *local-build
    environment: *local-env
  mcp:
    <<: *local-build
    environment: *local-env

volumes:
  ollama:
