name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff>=0.6
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tome
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      TOME_TEST_DSN: postgresql://postgres:postgres@localhost:5432/tome
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e . pytest
      - name: Unit + contract (no DB)
        run: pytest -m "not integration and not e2e" -q
      - name: Integration (Postgres)
        run: pytest -m integration -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build gateway/worker/mcp image
        run: docker build -t tome:ci .
      - name: Build Library UI image
        run: docker build -t tome-webui:ci ./webui
