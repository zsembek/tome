name: CI

on:
  push:
    branches: [main, "ci-canary/**"]   # ci-canary/** is used to verify CI catches failures
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"                # nightly: run the heavy "extras" verification job

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff>=0.6
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tome
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      TOME_TEST_DSN: postgresql://postgres:postgres@localhost:5432/tome
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e . pytest
      - name: Unit + contract (no DB)
        run: pytest -m "not integration and not e2e" -q
      - name: Integration (Postgres)
        run: pytest -m integration -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build gateway/worker/mcp image
        run: docker build -t tome:ci .
      - name: Build Library UI image
        run: docker build -t tome-webui:ci ./webui

  # Heavy verification of optional extractors/embedders (Docling, fastembed,
  # cross-encoder reranker). Runs nightly / on demand — not on every push, to keep
  # the per-commit badge fast and deterministic. This is where the gated real
  # tests (skipif when the lib is missing) actually execute.
  extras:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[fastembed,docling,rerank]" pytest
      - name: Run gated real tests (Docling / fastembed / reranker)
        run: pytest -m "not integration and not e2e" -q
