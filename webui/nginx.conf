server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: any non-API path serves index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API/docs to the gateway (single origin → no CORS, auth is transparent).
    # resolver + an upstream variable → nginx re-resolves DNS at runtime
    # (otherwise it caches the gateway IP from startup and returns 502 after the container is recreated).
    resolver 127.0.0.11 valid=10s ipv6=off;
    location ~ ^/(v1|health|docs|openapi\.json) {
        set $upstream gateway;
        proxy_pass http://$upstream:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600;
        client_max_body_size 1024m;   # large documents
    }
}
